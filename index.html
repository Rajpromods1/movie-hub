<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMagic Pro - Ad-Free Direct Links</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            background: linear-gradient(135deg, #090d16, #111827, #1f132e);
            color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px;
        }
        header { text-align: center; margin: 40px 0 20px 0; }
        header h1 {
            font-size: 2.5rem; font-weight: 700; background: linear-gradient(to right, #10b981, #3b82f6, #8b5cf6);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .search-container {
            width: 100%; max-width: 600px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px; padding: 6px 10px; display: flex; align-items: center; margin-bottom: 30px;
        }
        .search-container input { flex: 1; background: transparent; border: none; outline: none; color: #fff; font-size: 1rem; padding: 12px 15px; }
        .search-btn {
            background: linear-gradient(135deg, #10b981, #059669); border: none; color: white; padding: 12px 25px; border-radius: 40px; cursor: pointer; font-weight: 600;
        }
        .results-container { width: 100%; max-width: 700px; display: none; flex-direction: column; gap: 15px; }
        .link-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px;
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; transition: 0.3s;
        }
        .link-card:hover { background: rgba(255, 255, 255, 0.06); transform: translateY(-2px); }
        .source-tag { font-size: 0.75rem; background: #3b82f6; padding: 3px 8px; border-radius: 20px; text-transform: uppercase; font-weight: bold; }
        .movie-name { font-size: 1.05rem; font-weight: 600; margin-top: 5px; color: #e5e7eb; }
        .action-buttons { display: flex; gap: 10px; }
        .action-btn {
            padding: 10px 16px; border-radius: 10px; text-decoration: none; font-size: 0.9rem; font-weight: 600; display: inline-flex; align-items: center; gap: 6px;
        }
        .btn-stream { background: rgba(59, 130, 246, 0.2); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.4); }
        .btn-download { background: #10b981; color: #fff; }
        .loader { display: none; border: 4px solid rgba(255,255,255,0.1); width: 45px; height: 45px; border-radius: 50%; border-left-color: #10b981; animation: spin 1s linear infinite; margin-top: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header>
        <h1><i class="fa-solid fa-bolt"></i> CineMagic Pro</h1>
        <p style="color: #94a3b8; margin-top: 5px;">Direct Multi-Site Link Extractor (No Popups / No Ads)</p>
    </header>

    <div class="search-container">
        <input type="text" id="movieInput" placeholder="Movie ka sahi naam likhein... (e.g., Shiddat, Avengers)">
        <button class="search-btn" id="searchBtn">Extract Links</button>
    </div>

    <div class="loader" id="loader"></div>

    <div class="results-container" id="resultsContainer"></div>

    <script>
        const searchBtn = document.getElementById('searchBtn');
        const movieInput = document.getElementById('movieInput');
        const loader = document.getElementById('loader');
        const resultsContainer = document.getElementById('resultsContainer');

        searchBtn.addEventListener('click', startExtraction);
        movieInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') startExtraction(); });

        function startExtraction() {
            const query = movieInput.value.trim();
            if (!query) return alert("Pehle movie ka naam likhiye bhai!");

            loader.style.display = 'block';
            resultsContainer.style.display = 'none';
            resultsContainer.innerHTML = "";

            // Dynamic host checking for backend pipeline
            const backendHost = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost' ? '' : 'http://127.0.0.1:5000';

            fetch(`${backendHost}/api/scrape?query=${encodeURIComponent(query)}`)
                .then(res => res.json())
                .then(data => {
                    loader.style.display = 'none';
                    if(data.success && data.results.length > 0) {
                        data.results.forEach(item => {
                            const card = document.createElement('div');
                            card.className = 'link-card';
                            card.innerHTML = `
                                <div>
                                    <span class="source-tag">${item.site}</span>
                                    <div class="movie-name">${item.title}</div>
                                </div>
                                <div class="action-buttons">
                                    <a href="${item.url}" target="_blank" class="action-btn btn-stream"><i class="fa-solid fa-play"></i> Stream</a>
                                    <a href="${item.url}" target="_blank" download class="action-btn btn-download"><i class="fa-solid fa-download"></i> Direct DL</a>
                                </div>
                            `;
                            resultsContainer.appendChild(card);
                        });
                        resultsContainer.style.display = 'flex';
                    } else {
                        alert("Koi direct link nahi nikal paya, spelling check karein!");
                    }
                })
                .catch(err => {
                    loader.style.display = 'none';
                    alert("Aapka Python backend running nahi hai! Pydroid me play button dabayein.");
                });
        }
    </script>
</body>
</html>
