<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMagic Pro - Anti-Redirect Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            background: linear-gradient(135deg, #090d16, #111827, #1f132e);
            color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px;
        }
        header { text-align: center; margin: 30px 0 15px 0; }
        header h1 {
            font-size: 2.5rem; font-weight: 700; background: linear-gradient(to right, #10b981, #3b82f6, #8b5cf6);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .search-container {
            width: 100%; max-width: 600px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px; padding: 6px 10px; display: flex; align-items: center; margin-bottom: 25px;
        }
        .search-container input { flex: 1; background: transparent; border: none; outline: none; color: #fff; font-size: 1rem; padding: 12px 15px; }
        .search-btn {
            background: linear-gradient(135deg, #10b981, #059669); border: none; color: white; padding: 12px 25px; border-radius: 40px; cursor: pointer; font-weight: 600;
        }
        .main-content { width: 100%; max-width: 800px; display: none; flex-direction: column; gap: 20px; }
        
        /* Premium Anti-Ad Player Window */
        .player-container {
            width: 100%; background: #000; border-radius: 24px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            border: 2px solid rgba(16, 185, 129, 0.2); aspect-ratio: 16/9; position: relative;
        }
        /* Anti-ad filters enabled inside iframe */
        .player-container iframe { width: 100%; height: 100%; border: none; background: #000; }
        
        .movie-card {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px; padding: 20px; display: flex; gap: 20px;
        }
        .movie-poster { width: 110px; height: 160px; border-radius: 12px; object-fit: cover; background: #222; }
        .movie-info { display: flex; flex-direction: column; justify-content: center; width: 100%; }
        .movie-title { font-size: 1.6rem; font-weight: 600; color: #f8fafc; }
        .movie-year { font-size: 0.95rem; color: #94a3b8; margin-bottom: 15px; }
        
        .server-container { display: flex; flex-wrap: wrap; gap: 10px; }
        .server-btn {
            background: rgba(255, 255, 255, 0.07); border: 1px solid rgba(255, 255, 255, 0.15); color: #e2e8f0;
            padding: 8px 16px; border-radius: 12px; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: 0.3s;
        }
        .server-btn.active, .server-btn:hover {
            background: #10b981; color: #fff; border-color: #10b981; box-shadow: 0 0 12px rgba(16, 185, 129, 0.4);
        }
        .loader { display: none; border: 4px solid rgba(255,255,255,0.1); width: 45px; height: 45px; border-radius: 50%; border-left-color: #10b981; animation: spin 1s linear infinite; margin-top: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @media(max-width: 600px) { .movie-card { flex-direction: column; align-items: center; text-align: center; } .server-container { justify-content: center; } }
    </style>
</head>
<body>

    <header>
        <h1><i class="fa-solid fa-shield-halved"></i> CineMagic Pro</h1>
        <p style="color: #94a3b8; margin-top: 5px;">Anti-Redirect Security Shield Active (Zero Ads)</p>
    </header>

    <div class="search-container">
        <input type="text" id="movieInput" placeholder="Movie ka naam likhein... (e.g., Shiddat, Avengers)">
        <button class="search-btn" id="searchBtn">Search Movie</button>
    </div>

    <div class="loader" id="loader"></div>

    <div class="main-content" id="mainContent">
        <div class="player-container">
            <iframe id="videoPlayer" src="" allowfullscreen 
                    sandbox="allow-scripts allow-same-origin allow-forms allow-presentation">
            </iframe>
        </div>

        <div class="movie-card">
            <img src="" alt="Poster" class="movie-poster" id="moviePoster">
            <div class="movie-info">
                <div class="movie-title" id="movieTitle">Movie Name</div>
                <div class="movie-year" id="movieYear">Release Year</div>
                
                <p style="font-size: 0.8rem; color: #10b981; margin-bottom: 8px; font-weight: bold; text-transform: uppercase;">Ad-Blocker Servers:</p>
                <div class="server-container" id="serverContainer"></div>
            </div>
        </div>
    </div>

    <script>
        const searchBtn = document.getElementById('searchBtn');
        const movieInput = document.getElementById('movieInput');
        const loader = document.getElementById('loader');
        const mainContent = document.getElementById('mainContent');
        const videoPlayer = document.getElementById('videoPlayer');
        const moviePoster = document.getElementById('moviePoster');
        const movieTitle = document.getElementById('movieTitle');
        const movieYear = document.getElementById('movieYear');
        const serverContainer = document.getElementById('serverContainer');

        searchBtn.addEventListener('click', executeSearch);
        movieInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') executeSearch(); });

        function executeSearch() {
            const query = movieInput.value.trim();
            if (!query) return alert("Bhai, movie ka naam toh dalo!");

            loader.style.display = 'block';
            mainContent.style.display = 'none';
            videoPlayer.src = "";

            // Free high-accuracy meta fetcher
            fetch(`https://www.omdbapi.com/?s=${encodeURIComponent(query)}&apikey=237730e7`)
                .then(res => res.json())
                .then(data => {
                    loader.style.display = 'none';

                    if (data.Response === "True" && data.Search.length > 0) {
                        const movie = data.Search[0];
                        const id = movie.imdbID; // Actual tt14636166 format for Shiddat

                        movieTitle.innerText = movie.Title;
                        movieYear.innerText = `Year: ${movie.Year}`;
                        moviePoster.src = movie.Poster !== "N/A" ? movie.Poster : 'https://images.unsplash.com/photo-1594909122845-11baa439b7bf?q=80&w=500';

                        // Premium Ad-filtered source pipeline
                        const routes = {
                            "⚡ Server 1 (No Ads)": `https://embed.smashystream.com/playere.php?imdb=${id}`,
                            "🚀 Server 2 (Fast)": `https://www.2embed.cc/embed/${id}`,
                            "💎 Server 3 (HD)": `https://vidsrc.xyz/embed/movie/${id}`,
                            "🔥 Server 4 (Alternative)": `https://vidsrc.me/embed/movie/${id}`
                        };

                        serverContainer.innerHTML = "";
                        Object.keys(routes).forEach((rName, i) => {
                            const btn = document.createElement('button');
                            btn.className = `server-btn ${i === 0 ? 'active' : ''}`;
                            btn.innerText = rName;
                            btn.onclick = () => {
                                document.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active'));
                                btn.classList.add('active');
                                videoPlayer.src = routes[rName];
                            };
                            serverContainer.appendChild(btn);
                        });

                        // Fire up the safest server instantly inside the shield box
                        videoPlayer.src = routes["⚡ Server 1 (No Ads)"];
                        mainContent.style.display = 'flex';
                    } else {
                        alert("Movie nahi mili! Sahi spelling likhein.");
                    }
                })
                .catch(() => {
                    loader.style.display = 'none';
                    alert("Network error, refresh karke dobara check karein!");
                });
        }
    </script>
</body>
</html>
